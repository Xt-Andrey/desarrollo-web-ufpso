<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Activity of Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-info-subtle">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">MY SITE</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">START</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#login">LOGIN</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <div class="container mt-4">
        <div class="row">

            <!-- CARD 1 -->
            <div class="col-md-4">
                <div class="card">
                    <img src="https://picsum.photos/400/200/?blur" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">PRODUCT ONE</h5>
                        <p class="card-text">BRIEF PRODUCT DESCRIPTION.</p>
                        <button class="btn btn-primary btn-modal">SEE MORE</button>
                    </div>
                </div>
            </div>

            <!-- CARD 2 -->
            <div class="col-md-4">
                <div class="card">
                    <img src="https://picsum.photos/seed/picsum/400/200" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">PRODUCT TWO</h5>
                        <p class="card-text">BRIEF PRODUCT DESCRIPTION.</p>
                        <button class="btn btn-primary btn-modal">SEE MORE</button>
                    </div>
                </div>
            </div>

            <!-- CARD 3 -->
            <div class="col-md-4">
                <div class="card">
                    <img src="https://picsum.photos/400/200" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">PRODUCT THREE</h5>
                        <p class="card-text">BRIEF PRODUCT DESCRIPTION.</p>
                        <button class="btn btn-primary btn-modal">SEE MORE</button>
                    </div>
                </div>
            </div>

        </div>

        <!-- FORMULARIO -->
        <div class="row mt-5 mb-5" id="login">
            <div class="col-md-6 mx-auto">
                <h3 class="text-center">LOGIN</h3>

                <form id="loginForm" autocomplete="on">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" name="email" class="form-control" autocomplete="email">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control"
                            autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">GET INTO</button>
                </form>

                <div id="message" class="mt-3 text-center"></div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="exampleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">INFORMATION</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    ¡YOU HAVE CLICKED ON "SEE MORE"!
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- TU JS -->
    <script src="js/script.js"></script>

</body>
</html>
